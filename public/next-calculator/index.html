<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Калькулятор стоимости изделий с порошковой окраской</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <div class="container">
        <header class="header-card">
          <h1 class="header-title">Калькулятор стоимости изделий с порошковой окраской</h1>
          <p class="header-subtitle">Расчет стоимости материалов разной толщины с учетом покрытия и переработки</p>
        </header>

        <section class="layout">
          <div class="left-column">
            <article class="card card-materials" id="materialsCard">
              <div class="card-header">
                <h2>Цены сырья</h2>
                <div class="card-actions">
                  <button type="button" class="btn btn-ghost btn-sm" id="collapseBtn">Свернуть</button>
                  <button type="button" class="btn btn-outline btn-sm" id="editPricesBtn">
                    <span id="editPricesText">Редактировать цены</span>
                  </button>
                </div>
              </div>
              <div class="card-body" id="materialPricesBody">
                <div id="materialPrices" class="materials-list"></div>
                <div id="pricesActions" class="prices-actions hidden">
                  <button type="button" class="btn btn-primary btn-sm" id="savePricesBtn">Сохранить цены</button>
                  <button type="button" class="btn btn-outline btn-sm" id="resetPricesBtn">Сбросить</button>
                </div>
              </div>
            </article>

            <article class="card card-params">
              <div class="card-header">
                <h2>Параметры расчета</h2>
              </div>
              <div class="card-body">
                <label class="field">
                  <span>Цена окраски (руб/м²)</span>
                  <input type="number" id="paintingPrice" class="input" value="400" step="0.01" min="0" />
                </label>
                <label class="field">
                  <span>Ставка переработки (руб/т)</span>
                  <input type="number" id="processingRate" class="input" value="40000" step="0.01" min="0" />
                </label>
                <button type="button" class="btn btn-primary btn-full" id="calculateBtn">Рассчитать стоимость</button>
              </div>
            </article>
          </div>

          <div class="right-column">
            <article class="card card-results">
              <div class="card-header">
                <h2>Результаты</h2>
              </div>
              <div class="card-body">
                <div id="resultsContainer" class="results-wrap">
                  <p class="placeholder">Нажмите «Рассчитать стоимость», чтобы получить таблицу расчета.</p>
                </div>
              </div>
            </article>
          </div>
        </section>
      </div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
